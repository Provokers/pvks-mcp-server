<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Envio de áudio para transcrição | PVKS</title>

  <style>
    :root {
      --background: #efede7;
      --surface: #ffffff;
      --surface-soft: #f7f6f3;
      --border: #dfddd7;
      --border-strong: #cccac4;
      --text: #202020;
      --text-secondary: #777671;
      --text-muted: #aaa9a4;
      --orange: #f47a20;
      --orange-dark: #d96516;
      --orange-soft: #fff0e5;
      --success: #2c7a49;
      --success-soft: #edf8f0;
      --error: #a53a32;
      --error-soft: #fff0ee;
      --shadow: 0 10px 32px rgba(45, 40, 30, 0.06);
      --radius-large: 18px;
      --radius-medium: 13px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family:
        Aptos,
        Inter,
        Arial,
        Helvetica,
        sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(760px, calc(100% - 32px));
      margin: 20px auto 44px;
    }

    .topbar {
      min-height: 78px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 17px 22px;
      background: var(--surface);
      border: 1px solid rgba(223, 221, 215, 0.82);
      border-radius: var(--radius-large);
      box-shadow: var(--shadow);
    }

    .brand-logo {
      width: 176px;
      max-width: 42vw;
      height: auto;
      display: block;
    }

    .brand-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
      flex: 0 0 auto;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 16px;
      font-weight: 760;
      line-height: 1.25;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.4;
    }

    .panel {
      margin-top: 20px;
      padding: 24px 20px 22px;
      background: var(--surface);
      border: 1px solid rgba(223, 221, 215, 0.85);
      border-radius: var(--radius-large);
      box-shadow: var(--shadow);
    }

    .section-label {
      margin: 0 0 16px;
      color: #999894;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .drop-zone {
      min-height: 178px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 26px 22px;
      border: 2px dashed var(--border-strong);
      border-radius: 16px;
      background: #fff;
      text-align: center;
      cursor: pointer;
      transition:
        border-color 160ms ease,
        background-color 160ms ease,
        transform 160ms ease;
    }

    .drop-zone:hover,
    .drop-zone.dragging {
      border-color: var(--orange);
      background: var(--orange-soft);
      transform: translateY(-1px);
    }

    .upload-icon {
      width: 34px;
      height: 34px;
      color: #c8c7c3;
      transition: color 160ms ease;
    }

    .drop-zone:hover .upload-icon,
    .drop-zone.dragging .upload-icon {
      color: var(--orange);
    }

    .drop-zone-title {
      font-size: 13px;
      font-weight: 730;
      line-height: 1.4;
    }

    .drop-zone-subtitle {
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.5;
    }

    input[type="file"] {
      display: none;
    }

    .progress-section {
      display: none;
      margin-top: 16px;
      padding: 14px 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius-medium);
      background: var(--surface-soft);
    }

    .progress-section.visible {
      display: block;
    }

    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .progress-label {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
    }

    .progress-percent {
      color: var(--orange);
      font-size: 13px;
      font-weight: 800;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e2dd;
    }

    .progress-bar {
      position: relative;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--orange);
      transition: width 180ms ease;
    }

    .progress-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          110deg,
          transparent 0%,
          rgba(255, 255, 255, 0.1) 35%,
          rgba(255, 255, 255, 0.55) 50%,
          rgba(255, 255, 255, 0.1) 65%,
          transparent 100%
        );
      transform: translateX(-100%);
      animation: shimmer 1.25s linear infinite;
    }

    @keyframes shimmer {
      to {
        transform: translateX(100%);
      }
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 9px;
      color: var(--text-muted);
      font-size: 10px;
    }

    .file-card {
      display: none;
      margin-top: 15px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-medium);
      background: var(--surface-soft);
    }

    .file-card.visible {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-icon {
      width: 39px;
      height: 39px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: var(--orange-soft);
      color: var(--orange);
      font-size: 17px;
    }

    .file-details {
      min-width: 0;
      flex: 1;
    }

    .file-name {
      overflow: hidden;
      font-size: 13px;
      font-weight: 720;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-meta {
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 11px;
    }

    .session-card {
      margin-top: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-medium);
    }

    .session-header {
      padding: 10px 14px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border);
      color: #999894;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .session-row {
      padding: 12px 14px;
      border-bottom: 1px solid #ebe9e4;
    }

    .session-row:last-child {
      border-bottom: 0;
    }

    .session-label {
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 750;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .session-value {
      margin-top: 5px;
      color: #53524e;
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Consolas,
        monospace;
      font-size: 11px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .upload-button {
      width: 100%;
      min-height: 49px;
      margin-top: 17px;
      border: 0;
      border-radius: 12px;
      background: var(--orange);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(244, 122, 32, 0.2);
      transition:
        background-color 160ms ease,
        transform 160ms ease,
        opacity 160ms ease;
    }

    .upload-button:hover:not(:disabled) {
      background: var(--orange-dark);
      transform: translateY(-1px);
    }

    .upload-button:disabled {
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.35;
    }

    .privacy-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 13px 5px 0;
      color: var(--text-muted);
      font-size: 10px;
      line-height: 1.55;
    }

    .status-message {
      display: none;
      margin-top: 16px;
      padding: 14px 15px;
      border-radius: var(--radius-medium);
      font-size: 11px;
      line-height: 1.6;
    }

    .status-message.visible {
      display: block;
    }

    .status-message.success {
      background: var(--success-soft);
      color: var(--success);
    }

    .status-message.error {
      background: var(--error-soft);
      color: var(--error);
    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 20px, 760px);
        margin-top: 10px;
      }

      .topbar {
        align-items: flex-start;
        gap: 12px;
        padding: 16px;
      }

      .brand-logo {
        width: 132px;
      }

      .brand-divider,
      .brand-subtitle {
        display: none;
      }

      .brand-title {
        font-size: 14px;
      }

      .panel {
        padding: 18px 14px 16px;
      }

      .drop-zone {
        min-height: 164px;
        padding: 22px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <img
        class="brand-logo"
        src="https://pvksdesignsystem.figma.site/_assets/v11/5f1fca546e727b1b45937f8b45c2dd088f3be8ac.png"
        alt="Provokers"
      >

      <span class="brand-divider" aria-hidden="true"></span>

      <div class="brand-copy">
        <h1 class="brand-title">
          Envio de áudio para transcrição
        </h1>

        <p class="brand-subtitle">
          Envie o arquivo indicado pelo agente PVKS.
        </p>
      </div>
    </header>

    <main class="panel">
      <p class="section-label">
        Arquivo de áudio
      </p>

      <label
        id="dropZone"
        class="drop-zone"
        for="fileInput"
      >
        <svg
          class="upload-icon"
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M7 18.5H6.5A4.5 4.5 0 0 1 6.1 9.52 6.25 6.25 0 0 1 18.24 11 3.75 3.75 0 0 1 18 18.5h-1"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
          />

          <path
            d="M12 20V12m0 0-3 3m3-3 3 3"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>

        <span class="drop-zone-title">
          Arraste o áudio ou clique para selecionar
        </span>

        <span class="drop-zone-subtitle">
          MP3, M4A, MP4, WAV, AAC, FLAC, OGG ou WEBM
        </span>
      </label>

      <input
        id="fileInput"
        type="file"
        accept=".mp3,.m4a,.mp4,.wav,.aac,.flac,.ogg,.webm,audio/*"
      >

      <section
        id="progressSection"
        class="progress-section"
      >
        <div class="progress-header">
          <span id="progressLabel" class="progress-label">
            Preparando o envio
          </span>

          <span id="progressPercent" class="progress-percent">
            0%
          </span>
        </div>

        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="progress-meta">
          <span id="uploadedAmount">
            0 MB enviados
          </span>

          <span id="totalAmount">
            0 MB no total
          </span>
        </div>
      </section>

      <div id="fileCard" class="file-card">
        <div class="file-icon" aria-hidden="true">
          ♫
        </div>

        <div class="file-details">
          <div id="fileName" class="file-name"></div>
          <div id="fileMeta" class="file-meta"></div>
        </div>
      </div>

      <div class="session-card">
        <div class="session-header">
          Sessão de transcrição
        </div>

        <div class="session-row">
          <div class="session-label">
            Arquivo esperado
          </div>

          <div id="expectedFile" class="session-value">
            Não informado
          </div>
        </div>

        <div class="session-row">
          <div class="session-label">
            ID da transcrição
          </div>

          <div id="transcriptionId" class="session-value">
            Não informado
          </div>
        </div>
      </div>

      <button
        id="uploadButton"
        class="upload-button"
        type="button"
        disabled
      >
        Enviar áudio
      </button>

      <div class="privacy-note">
        <span aria-hidden="true">◇</span>

        <span>
          Mantenha esta página aberta até o envio chegar a 100%.
        </span>
      </div>

      <div
        id="estimatedTime"
        class="estimated-time"
      ></div>

      <div
        id="statusMessage"
        class="status-message"
        role="status"
      ></div>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(
      window.location.hash.slice(1)
    );

    const uploadUrl = params.get("upload_url") || "";
    const transcriptionId =
      params.get("transcription_id") || "";
    const expectedFilename =
      params.get("filename") || "";
    const expectedSize = Number(
      params.get("file_size") || 0
    );
    const expectedContentType =
      params.get("content_type") || "";

    const dropZone =
      document.getElementById("dropZone");
    const fileInput =
      document.getElementById("fileInput");
    const fileCard =
      document.getElementById("fileCard");
    const fileName =
      document.getElementById("fileName");
    const fileMeta =
      document.getElementById("fileMeta");
    const uploadButton =
      document.getElementById("uploadButton");
    const transcriptionIdElement =
      document.getElementById("transcriptionId");
    const expectedFileElement =
      document.getElementById("expectedFile");
    const statusMessage =
      document.getElementById("statusMessage");
    const progressSection =
      document.getElementById("progressSection");
    const progressLabel =
      document.getElementById("progressLabel");
    const progressPercent =
      document.getElementById("progressPercent");
    const progressBar =
      document.getElementById("progressBar");
    const uploadedAmount =
      document.getElementById("uploadedAmount");
    const totalAmount =
      document.getElementById("totalAmount");

    let selectedFile = null;
    let processingStartedAt = null;

    transcriptionIdElement.textContent =
      transcriptionId || "Não informado";

    expectedFileElement.textContent =
      expectedFilename || "Não informado";

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) {
        return "0 bytes";
      }

      const units = ["bytes", "KB", "MB", "GB"];

      const index = Math.min(
        Math.floor(Math.log(bytes) / Math.log(1024)),
        units.length - 1
      );

      const value = bytes / Math.pow(1024, index);

      return `${value.toFixed(index === 0 ? 0 : 2)} ${units[index]}`;
    }

    function setStatusMessage(message, type) {
      statusMessage.textContent = message;
      statusMessage.className =
        `status-message visible ${type}`;
    }

    function clearStatusMessage() {
      statusMessage.textContent = "";
      statusMessage.className = "status-message";
    }

    function resetProgress() {
      progressSection.classList.remove("visible");
      progressPercent.textContent = "0%";
      progressLabel.textContent = "Preparando o envio";
      progressBar.style.width = "0%";
      uploadedAmount.textContent = "0 MB enviados";
      totalAmount.textContent = "0 MB no total";
    }

    function selectFile(file) {
      clearStatusMessage();
      resetProgress();

      if (!file) {
        selectedFile = null;
        fileCard.classList.remove("visible");
        uploadButton.disabled = true;
        return;
      }

      const allowedExtensions = [
        "mp3",
        "m4a",
        "mp4",
        "wav",
        "aac",
        "flac",
        "ogg",
        "webm"
      ];

      const extension =
        file.name.split(".").pop()?.toLowerCase();

      if (
        !extension ||
        !allowedExtensions.includes(extension)
      ) {
        selectedFile = null;
        uploadButton.disabled = true;

        setStatusMessage(
          "Formato não permitido. Selecione um arquivo compatível.",
          "error"
        );

        return;
      }

      if (
        expectedFilename &&
        file.name !== expectedFilename
      ) {
        selectedFile = null;
        uploadButton.disabled = true;

        setStatusMessage(
          `Arquivo incorreto. Esperado: ${expectedFilename}.`,
          "error"
        );

        return;
      }

      if (
        expectedSize > 0 &&
        file.size !== expectedSize
      ) {
        selectedFile = null;
        uploadButton.disabled = true;

        setStatusMessage(
          `Tamanho diferente do esperado. Esperado: ${formatBytes(expectedSize)}. Selecionado: ${formatBytes(file.size)}.`,
          "error"
        );

        return;
      }

      selectedFile = file;

      fileName.textContent = file.name;

      fileMeta.textContent =
        `${formatBytes(file.size)} · ${file.type || "tipo não identificado"}`;

      fileCard.classList.add("visible");
      uploadButton.disabled = !uploadUrl;

      setStatusMessage(
        "Arquivo validado. Clique em “Enviar áudio”.",
        "success"
      );
    }

    fileInput.addEventListener("change", () => {
      selectFile(fileInput.files?.[0] || null);
    });

    dropZone.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropZone.classList.add("dragging");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragging");
    });

    dropZone.addEventListener("drop", (event) => {
      event.preventDefault();
      dropZone.classList.remove("dragging");

      const file = event.dataTransfer?.files?.[0];

      if (file) {
        selectFile(file);
      }
    });

    let lastProcessingPercentage = -1;
    let statusPollingTimer = null;

    function normalizeProcessingPercentage(data) {
      const rawValue = Number(
        data?.google_progress_percent ??
        data?.progress_percent ??
        data?.progress ??
        0
      );

      if (!Number.isFinite(rawValue)) {
        return 0;
      }

      const safeValue = Math.max(
        0,
        Math.min(100, rawValue)
      );

      if (safeValue >= 100) {
        return 100;
      }

      return Math.round(safeValue);
    }

    function formatTime(seconds) {

      if (
        !Number.isFinite(seconds) ||
        seconds < 0
      ) {
        return "--";
      }

      const minutes =
        Math.floor(seconds / 60);

      const remainingSeconds =
        Math.floor(seconds % 60);

      if (minutes === 0) {
        return `${remainingSeconds}s`;
      }

      return `${minutes}min ${remainingSeconds}s`;
    }


    function updateEstimatedTime(
      percentage
    ) {

      if (
        !processingStartedAt ||
        percentage <= 0
      ) {
        return;
      }


      const elapsed =
        (Date.now() - processingStartedAt) / 1000;


      const estimatedTotal =
        elapsed / (percentage / 100);


      const remaining =
        estimatedTotal - elapsed;


      const element =
        document.getElementById(
          "estimatedTime"
        );


      if (element) {

        element.textContent =
          `Tempo estimado restante: ${formatTime(remaining)}`;

      }

    }



    function updateProcessingProgress(
      percentage,
      label = "Processamento no Google Cloud"
    ) {
      if (
        percentage === lastProcessingPercentage
      ) {
        return;
      }

      lastProcessingPercentage = percentage;

      progressSection.classList.add("visible");
      progressPercent.textContent =
        `${percentage}%`;
      progressBar.style.width =
        `${percentage}%`;
      progressLabel.textContent = label;
    }

    async function checkTranscriptionStatus() {
      try {
        const response = await fetch(
          `/api/transcription-status/${encodeURIComponent(transcriptionId)}`,
          {
            method: "GET",
            headers: {
              Accept: "application/json"
            }
          }
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(
            data?.details ||
            data?.error ||
            `HTTP ${response.status}`
          );
        }

        const status =
          String(data?.status || "").toLowerCase();

        const percentage =
          normalizeProcessingPercentage(data);

        if (
          status === "completed" ||
          percentage >= 100
        ) {
          updateProcessingProgress(
            100,
            "Transcrição concluída"
          );

          setStatusMessage(
            "Transcrição concluída com sucesso. Volte ao agente e peça para abrir o resultado.",
            "success"
          );

          if (statusPollingTimer) {
            clearTimeout(statusPollingTimer);
            statusPollingTimer = null;
          }

          return;
        }

        if (
          status === "error" ||
          status === "failed"
        ) {
          throw new Error(
            data?.error_message ||
            "O processamento da transcrição falhou."
          );
        }

        updateProcessingProgress(
          percentage,
          "Processamento no Google Cloud"
        );

        updateEstimatedTime(
          percentage
        );

        statusPollingTimer = setTimeout(
          checkTranscriptionStatus,
          5000
        );
      } catch (error) {
        setStatusMessage(
          `Não foi possível atualizar o processamento: ${error.message}`,
          "error"
        );
      }
    }

    async function startAutomaticTranscription() {
      progressPercent.textContent = "5%";
      progressBar.style.width = "5%";
      progressLabel.textContent =
        "Preparando a transcrição";
      lastProcessingPercentage = 5;

      processingStartedAt =
        Date.now();

      const response = await fetch(
        "/api/upload-complete",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json"
          },
          body: JSON.stringify({
            transcription_id:
              transcriptionId
          })
        }
      );

      const data = await response.json();

      if (!response.ok) {
        throw new Error(
          data?.details ||
          data?.error ||
          `HTTP ${response.status}`
        );
      }

      setStatusMessage(
        "Upload concluído. A transcrição foi iniciada automaticamente.",
        "success"
      );

      statusPollingTimer = setTimeout(
        checkTranscriptionStatus,
        2000
      );
    }

    uploadButton.addEventListener("click", () => {
      if (!uploadUrl) {
        setStatusMessage(
          "Esta página não possui uma sessão válida.",
          "error"
        );

        return;
      }

      if (!selectedFile) {
        setStatusMessage(
          "Selecione o áudio antes de iniciar o envio.",
          "error"
        );

        return;
      }

      uploadButton.disabled = true;
      fileInput.disabled = true;
      dropZone.style.pointerEvents = "none";

      clearStatusMessage();

      progressSection.classList.add("visible");
      progressPercent.textContent = "0%";
      progressLabel.textContent = "Preparando o envio";
      progressBar.style.width = "0%";
      uploadedAmount.textContent = "0 MB enviados";
      totalAmount.textContent =
        `${formatBytes(selectedFile.size)} no total`;

      const request = new XMLHttpRequest();

      request.open("PUT", uploadUrl, true);

      request.setRequestHeader(
        "Content-Type",
        expectedContentType ||
          selectedFile.type ||
          "application/octet-stream"
      );

      request.setRequestHeader(
        "Content-Range",
        `bytes 0-${selectedFile.size - 1}/${selectedFile.size}`
      );

      request.upload.addEventListener(
        "progress",
        (event) => {
          if (!event.lengthComputable) {
            return;
          }

          const rawPercentage = Math.min(
            100,
            Math.round(
              (event.loaded / event.total) * 100
            )
          );

          const percentage =
            rawPercentage >= 100
              ? 100
              : Math.floor(rawPercentage / 5) * 5;

          progressPercent.textContent =
            `${percentage}%`;

          progressBar.style.width =
            `${percentage}%`;

          uploadedAmount.textContent =
            `${formatBytes(event.loaded)} enviados`;

          progressLabel.textContent =
            percentage < 100
              ? "Enviando áudio"
              : "Finalizando arquivo";
        }
      );

      request.addEventListener("load", () => {
        if (
          request.status === 200 ||
          request.status === 201
        ) {
          progressPercent.textContent = "100%";
          progressBar.style.width = "100%";
          progressLabel.textContent = "Upload concluído";

          try {
            localStorage.setItem(
              `pvks-upload-${transcriptionId}`,
              JSON.stringify({
                transcription_id: transcriptionId,
                filename: expectedFilename,
                completed_at: new Date().toISOString()
              })
            );
          } catch (_error) {
            // O upload continua valido mesmo sem localStorage.
          }

          setStatusMessage(
            "Upload concluído. Iniciando o processamento da transcrição...",
            "success"
          );

          startAutomaticTranscription()
            .catch((error) => {
              setStatusMessage(
                `O upload foi concluído, mas não foi possível iniciar a transcrição automaticamente: ${error.message}`,
                "error"
              );
            });

          return;
        }

        const message =
          `O armazenamento respondeu com HTTP ${request.status}. Gere uma nova sessão.`;

        setStatusMessage(message, "error");

        uploadButton.disabled = false;
        fileInput.disabled = false;
        dropZone.style.pointerEvents = "auto";
      });

      request.addEventListener("error", () => {
        setStatusMessage(
          "Falha de conexão ou bloqueio de CORS durante o envio.",
          "error"
        );

        uploadButton.disabled = false;
        fileInput.disabled = false;
        dropZone.style.pointerEvents = "auto";
      });

      request.addEventListener("abort", () => {
        setStatusMessage(
          "O envio foi interrompido antes da conclusão.",
          "error"
        );

        uploadButton.disabled = false;
        fileInput.disabled = false;
        dropZone.style.pointerEvents = "auto";
      });

      request.send(selectedFile);
    });

    if (!uploadUrl) {
      uploadButton.disabled = true;

      setStatusMessage(
        "Esta página foi aberta sem uma sessão de upload. Gere um link pelo agente PVKS.",
        "error"
      );
    }
  </script>
</body>
</html>
